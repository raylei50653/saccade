name: CI (Lint, Type Check, Test)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Check Lockfile
        run: uv lock --check
      - name: Sync dependencies
        run: uv sync
      - name: Ruff Check
        run: uv run ruff check .
      - name: Ruff Format Check
        run: uv run ruff format --check .
      - name: Type Check with mypy
        run: uv run mypy perception/ cognition/ pipeline/ media/ storage/

  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install System GStreamer & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev pkg-config cmake libopencv-dev
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync
      - name: Build C++ Stubs for Testing
        run: |
          mkdir build && cd build
          cmake .. -Dpybind11_DIR=$(uv run python -c "import pybind11; print(pybind11.get_cmake_dir())")
          make -j$(nproc) || echo "C++ stubs build failed, some tests might be skipped"
      - name: Run Pytest (exclude GPU benchmarks)
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/build
          uv run pytest tests/ -v --ignore=tests/benchmarks
