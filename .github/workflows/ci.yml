name: CI (Lint, Type Check, Test)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Check Lockfile
        run: uv lock --check
      - name: Sync dependencies
        run: uv sync
      - name: Ruff Check
        run: uv run ruff check .
      - name: Ruff Format Check
        run: uv run ruff format --check .
      - name: Type Check with mypy
        run: uv run mypy .

  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            pkg-config \
            cmake \
            libopencv-dev \
            libnvinfer-dev \
            libnvinfer-plugin-dev
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync
      - name: Build C++ Core for Testing
        run: |
          mkdir build && cd build
          cmake .. -Dpybind11_DIR=$(uv run python -c "import pybind11; print(pybind11.get_cmake_dir())")
          make -j$(nproc)
      - name: Run Pytest (exclude GPU benchmarks)
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/build:$(pwd)
          uv run pytest tests/ -v --ignore=tests/benchmarks
