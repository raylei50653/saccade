<svg width="100%" viewBox="0 0 680 620" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Saccade System Architecture</title>
  <desc>Dual-track asynchronous pipeline architecture featuring fast perception path, slow cognition path, and underlying compute infrastructure.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: sans-serif; fill: #1a1a1a; }
      .th  { font-size: 14px; font-weight: 500; }
      .ts  { font-size: 12px; font-weight: 400; fill: #555; }
      .arr { fill: none; stroke: #888; stroke-width: 1.2; }

      /* Fast Path - teal */
      .c-teal rect  { fill: #E1F5EE; stroke: #0F6E56; }
      .c-teal .th   { fill: #085041; }
      .c-teal .ts   { fill: #0F6E56; }

      /* Slow Path - coral */
      .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
      .c-coral .th  { fill: #4A1B0C; }
      .c-coral .ts  { fill: #993C1D; }

      /* Compute - blue */
      .c-blue rect  { fill: #E6F1FB; stroke: #185FA5; }
      .c-blue .th   { fill: #042C53; }
      .c-blue .ts   { fill: #185FA5; }

      /* Infrastructure - gray */
      .c-gray rect  { fill: #F1EFE8; stroke: #5F5E5A; }
      .c-gray .th   { fill: #2C2C2A; }
      .c-gray .ts   { fill: #5F5E5A; }

      /* Trigger - amber */
      .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
      .c-amber .th  { fill: #412402; }

      /* Media Gateway - purple */
      .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
      .c-purple .th  { fill: #26215C; }
      .c-purple .ts  { fill: #534AB7; }

      /* Background Containers */
      .bg-teal   { fill: #E1F5EE; stroke: #0F6E56; }
      .bg-coral  { fill: #FAECE7; stroke: #993C1D; }
      .bg-blue   { fill: #E6F1FB; stroke: #185FA5; }
    </style>
  </defs>

  <!-- ── Video Input ── -->
  <g class="c-gray">
    <rect x="40" y="30" width="140" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="110" y="51" text-anchor="middle" dominant-baseline="central">Video Input</text>
    <text class="ts" x="110" y="68" text-anchor="middle" dominant-baseline="central">Camera / FFmpeg</text>
  </g>

  <!-- ── MediaMTX ── -->
  <g class="c-purple">
    <rect x="260" y="30" width="160" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="51" text-anchor="middle" dominant-baseline="central">MediaMTX</text>
    <text class="ts" x="340" y="68" text-anchor="middle" dominant-baseline="central">Media Gateway / Buffer</text>
  </g>

  <!-- Arrow: Input → MediaMTX -->
  <line x1="180" y1="56" x2="258" y2="56" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="219" y="48" text-anchor="middle">RTSP/RTMP</text>

  <!-- ══ Fast Path Container ══ -->
  <rect x="40" y="130" width="280" height="180" rx="14" class="bg-teal" stroke-width="0.5" opacity="0.5"/>
  <text class="th" x="60" y="156" dominant-baseline="central" style="fill:#085041">Fast Path (Perception)</text>
  <text class="ts" x="60" y="172" dominant-baseline="central">Low Latency · Continuous</text>

  <!-- YOLO26 -->
  <g class="c-teal">
    <rect x="60" y="185" width="110" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="115" y="205" text-anchor="middle" dominant-baseline="central">YOLO26</text>
    <text class="ts" x="115" y="222" text-anchor="middle" dominant-baseline="central">Object Detection</text>
  </g>

  <!-- CV Tracking -->
  <g class="c-teal">
    <rect x="192" y="185" width="110" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="247" y="205" text-anchor="middle" dominant-baseline="central">CV Tracking</text>
    <text class="ts" x="247" y="222" text-anchor="middle" dominant-baseline="central">Entropy Eval</text>
  </g>

  <!-- High-Value Event Trigger -->
  <g class="c-amber">
    <rect x="60" y="257" width="240" height="40" rx="8" stroke-width="0.5"/>
    <text class="th" x="180" y="277" text-anchor="middle" dominant-baseline="central">High-Value Event Trigger</text>
  </g>

  <line x1="115" y1="233" x2="115" y2="255" class="arr" marker-end="url(#arrow)"/>
  <line x1="247" y1="233" x2="247" y2="255" class="arr" marker-end="url(#arrow)"/>

  <!-- ══ Slow Path Container ══ -->
  <rect x="360" y="130" width="280" height="180" rx="14" class="bg-coral" stroke-width="0.5" opacity="0.5"/>
  <text class="th" x="380" y="156" dominant-baseline="central" style="fill:#4A1B0C">Slow Path (Cognition)</text>
  <text class="ts" x="380" y="172" dominant-baseline="central">On-Demand · Deep Analysis</text>

  <!-- LLM/VLM -->
  <g class="c-coral">
    <rect x="380" y="185" width="120" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="440" y="205" text-anchor="middle" dominant-baseline="central">LLM / VLM</text>
    <text class="ts" x="440" y="222" text-anchor="middle" dominant-baseline="central">llama.cpp Backend</text>
  </g>

  <!-- CLIP/SigLIP -->
  <g class="c-coral">
    <rect x="516" y="185" width="110" height="48" rx="8" stroke-width="0.5"/>
    <text class="th" x="571" y="205" text-anchor="middle" dominant-baseline="central">CLIP/SigLIP</text>
    <text class="ts" x="571" y="222" text-anchor="middle" dominant-baseline="central">Semantic Alignment</text>
  </g>

  <!-- Structured Analysis Output -->
  <g class="c-coral">
    <rect x="380" y="257" width="240" height="40" rx="8" stroke-width="0.5"/>
    <text class="th" x="500" y="277" text-anchor="middle" dominant-baseline="central">Structured Output</text>
  </g>

  <line x1="440" y1="233" x2="440" y2="255" class="arr" marker-end="url(#arrow)"/>
  <line x1="571" y1="233" x2="571" y2="255" class="arr" marker-end="url(#arrow)"/>

  <!-- Fast → Slow Trigger Arrow -->
  <line x1="300" y1="277" x2="378" y2="277" stroke="#BA7517" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
  <text class="ts" x="339" y="269" text-anchor="middle">Trigger</text>

  <!-- MediaMTX → Fast Path -->
  <line x1="310" y1="78" x2="180" y2="128" class="arr" marker-end="url(#arrow)"/>
  <!-- MediaMTX → Slow Path (Keyframes) -->
  <line x1="390" y1="82" x2="500" y2="128" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="468" y="112" text-anchor="middle">Keyframes</text>

  <!-- ══ Underlying Compute Layer ══ -->
  <rect x="40" y="360" width="600" height="60" rx="12" class="bg-blue" stroke-width="0.5" opacity="0.5"/>
  <text class="th" x="340" y="380" text-anchor="middle" dominant-baseline="central" style="fill:#042C53">Compute Infrastructure — Zero-Copy Path</text>
  <text class="ts" x="340" y="400" text-anchor="middle" dominant-baseline="central">NVDEC → NVMM → CUDA Tensor  ·  TensorRT  ·  PagedAttention</text>

  <!-- Pipeline → Compute Layer -->
  <line x1="180" y1="310" x2="180" y2="358" class="arr" marker-end="url(#arrow)"/>
  <line x1="500" y1="310" x2="500" y2="358" class="arr" marker-end="url(#arrow)"/>

  <!-- ══ Infrastructure Layer ══ -->
  <g class="c-gray">
    <rect x="40" y="450" width="180" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="130" y="471" text-anchor="middle" dominant-baseline="central">State Storage</text>
    <text class="ts" x="130" y="488" text-anchor="middle" dominant-baseline="central">ChromaDB / Redis</text>
  </g>

  <g class="c-gray">
    <rect x="250" y="450" width="160" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="330" y="471" text-anchor="middle" dominant-baseline="central">Process Mgmt</text>
    <text class="ts" x="330" y="488" text-anchor="middle" dominant-baseline="central">Systemd + NVML</text>
  </g>

  <g class="c-gray">
    <rect x="440" y="450" width="200" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="540" y="471" text-anchor="middle" dominant-baseline="central">Env Mgmt</text>
    <text class="ts" x="540" y="488" text-anchor="middle" dominant-baseline="central">Nix Flakes + uv</text>
  </g>

  <!-- Compute → Infrastructure Arrows -->
  <line x1="130" y1="420" x2="130" y2="448" class="arr" marker-end="url(#arrow)"/>
  <line x1="330" y1="420" x2="330" y2="448" class="arr" marker-end="url(#arrow)"/>
  <line x1="540" y1="420" x2="540" y2="448" class="arr" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="40" y="552" width="12" height="12" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="ts" x="58" y="562" dominant-baseline="central">Fast Path</text>
  <rect x="120" y="552" width="12" height="12" rx="2" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="ts" x="138" y="562" dominant-baseline="central">Slow Path</text>
  <rect x="200" y="552" width="12" height="12" rx="2" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="ts" x="218" y="562" dominant-baseline="central">Compute</text>
  <rect x="280" y="552" width="12" height="12" rx="2" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="ts" x="298" y="562" dominant-baseline="central">Infrastructure</text>
</svg>