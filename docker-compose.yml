services:
  saccade:
    build:
      context: .
      dockerfile: Dockerfile
    image: saccade:latest
    container_name: saccade_dev
    runtime: nvidia
    
    # 支援 GPU 存取
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, video, compute, utility]

    # 工作目錄映射 (宿主機原始碼同步到容器)
    volumes:
      - .:/app
      - /app/.venv # 保護容器內的虛擬環境不被宿主機覆蓋
      - /tmp/.X11-unix:/tmp/.X11-unix # 支援 X11 顯示
      # - /home/ray/.cache/uv:/root/.cache/uv # 暫時停用共用快取以排除故障
    
    # 環境變量配置
    environment:
      - DISPLAY=${DISPLAY}
      - NVIDIA_DRIVER_CAPABILITIES=all
      - PYTHONPATH=/app
      - UV_LINK_MODE=copy
      
    # 網路配置 (對應 MediaMTX 或 LLM Server)
    network_mode: host
    
    # 共享記憶體優化 (重要：防止視訊處理 OOM)
    shm_size: '2gb'
    
    # 讓容器保持運行以便開發
    stdin_open: true
    tty: true
    
    # 開發時預設進入 zsh
    command: /bin/zsh

  redis:
    image: redis:7-alpine
    container_name: saccade_redis
    network_mode: host
    restart: always
